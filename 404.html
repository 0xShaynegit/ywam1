<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found | YWAM Chiang Mai</title>
  <meta name="robots" content="noindex">
  <style>
    @font-face {
      font-family: "Space Grotesk";
      src: url("fonts/space-grotesk-var-latin.woff2") format("woff2");
      font-weight: 300 700;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Space Grotesk", system-ui, sans-serif;
      background: #0d1310;
      color: #f2ede1;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      text-align: center;
    }

    .code {
      font-size: clamp(4rem, 15vw, 8rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #e0a63a;
    }

    h1 {
      font-size: clamp(1.3rem, 3vw, 1.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 1rem 0 0.5rem;
    }

    p { color: #b9b3a3; max-width: 42ch; margin-inline: auto; }

    a {
      display: inline-flex;
      align-items: center;
      min-height: 3rem;
      margin-top: 2rem;
      padding: 0.85rem 1.75rem;
      background: #c75b33;
      color: #f2ede1;
      font-weight: 700;
      text-decoration: none;
      border-radius: 999px;
      transition: background-color 0.25s ease, transform 0.2s ease;
    }

    a:hover { background: #dd6f43; transform: translateY(-1px); }
    a:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <main>
    <p class="code">404</p>
    <h1>This trail does not exist.</h1>
    <p>The page you are after has moved, or never was. The homepage has every open track, real costs and the 1-minute application.</p>
    <a href="index.html">Back to the homepage</a>
  </main>
</body>
</html>
